name: Electron Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (z.B. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: electron-dev

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4

      - name: Dependencies installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript kompilieren (Electron)
        run: pnpm exec tsc --project tsconfig.electron.json

      - name: JS zu CJS umbenennen
        run: node scripts/rename-to-cjs.cjs

      - name: React-App bauen (Vite)
        run: pnpm exec vite build

      - name: Staging-Verzeichnis erstellen
        run: node scripts/prepare-electron-build.cjs

      - name: Electron-App bauen (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --linux AppImage deb

      - name: Electron-App bauen (Windows)
        if: matrix.platform == 'windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --win nsis

      - name: Electron-App bauen (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac dmg zip

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.exe
            release/**/*.dmg
            release/**/*.zip
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    name: GitHub Release erstellen
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Alle Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "Synthstudio ${{ github.ref_name }}"
          body: |
            ## Synthstudio ${{ github.ref_name }}

            | Plattform | Datei |
            |---|---|
            | Linux | `.AppImage`, `.deb` |
            | Windows | `.exe` (NSIS Installer) |
            | macOS | `.dmg`, `.zip` |
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
